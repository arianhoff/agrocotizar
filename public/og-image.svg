<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E1513"/>
      <stop offset="1" stop-color="#162018"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3FA34D" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#3FA34D" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="card-clip">
      <rect x="680" y="140" width="440" height="350" rx="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow top-right -->
  <ellipse cx="1050" cy="80" rx="400" ry="300" fill="url(#glow)"/>

  <!-- Glow bottom-left -->
  <ellipse cx="150" cy="580" rx="280" ry="200" fill="#3FA34D" fill-opacity="0.07"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Logo mark -->
  <rect x="64" y="64" width="48" height="48" rx="12" fill="#3FA34D"/>
  <text x="88" y="97" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="white" text-anchor="middle">C</text>

  <!-- Logo text -->
  <text x="124" y="97" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="600" fill="white" letter-spacing="-0.5">Cotizagro</text>

  <!-- Eyebrow -->
  <rect x="64" y="180" width="24" height="2" rx="1" fill="#3FA34D"/>
  <text x="96" y="193" font-family="ui-monospace, monospace" font-size="14" font-weight="500" fill="#3FA34D" letter-spacing="2">MAQUINARIA AGRÍCOLA · IA</text>

  <!-- Main headline -->
  <text x="64" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="700" fill="white" letter-spacing="-2">Cotizaciones</text>
  <text x="64" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="700" fill="white" letter-spacing="-2">profesionales</text>
  <text x="64" y="404" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="700" letter-spacing="-2">
    <tspan fill="#3FA34D">en minutos.</tspan>
  </text>

  <!-- Subtext -->
  <text x="64" y="458" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#FFFFFF" fill-opacity="0.5">Cargá tu lista de precios · La IA la procesa · Mandás el PDF</text>

  <!-- CTA pill -->
  <rect x="64" y="494" width="220" height="46" rx="23" fill="#3FA34D"/>
  <text x="174" y="523" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">14 días gratis</text>

  <!-- Domain -->
  <text x="64" y="578" font-family="ui-monospace, monospace" font-size="14" fill="#FFFFFF" fill-opacity="0.35" letter-spacing="1">cotizagro.com.ar</text>

  <!-- Mock card -->
  <rect x="680" y="140" width="440" height="350" rx="20" fill="#1A2420" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Card header -->
  <rect x="680" y="140" width="440" height="50" rx="20" fill="#1E2A26"/>
  <rect x="680" y="165" width="440" height="25" fill="#1E2A26"/>
  <circle cx="708" cy="165" r="8" fill="#EF4444" fill-opacity="0.6"/>
  <circle cx="728" cy="165" r="8" fill="#F59E0B" fill-opacity="0.6"/>
  <circle cx="748" cy="165" r="8" fill="#22C55E" fill-opacity="0.6"/>
  <rect x="790" y="157" width="200" height="16" rx="8" fill="#FFFFFF" fill-opacity="0.06"/>

  <!-- Card body rows -->
  <g transform="translate(700, 210)">
    <!-- Header row -->
    <rect x="0" y="0" width="55" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.2"/>
    <rect x="160" y="0" width="40" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.2"/>
    <rect x="300" y="0" width="50" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.2"/>

    <!-- Row 1 -->
    <rect x="0" y="26" width="130" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.5"/>
    <rect x="160" y="26" width="55" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.3"/>
    <rect x="280" y="22" width="70" height="16" rx="4" fill="#3FA34D" fill-opacity="0.8"/>

    <!-- Row 2 -->
    <rect x="0" y="54" width="110" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.5"/>
    <rect x="160" y="54" width="55" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.3"/>
    <rect x="280" y="50" width="70" height="16" rx="4" fill="#3FA34D" fill-opacity="0.8"/>

    <!-- Row 3 -->
    <rect x="0" y="82" width="140" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.5"/>
    <rect x="160" y="82" width="55" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.3"/>
    <rect x="280" y="78" width="70" height="16" rx="4" fill="#F59E0B" fill-opacity="0.7"/>

    <!-- Row 4 -->
    <rect x="0" y="110" width="120" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.5"/>
    <rect x="160" y="110" width="55" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.3"/>
    <rect x="280" y="106" width="70" height="16" rx="4" fill="#3FA34D" fill-opacity="0.8"/>

    <!-- Divider -->
    <line x1="0" y1="138" x2="400" y2="138" stroke="#FFFFFF" stroke-opacity="0.08"/>

    <!-- Total row -->
    <rect x="0" y="152" width="50" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.6"/>
    <rect x="260" y="150" width="90" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.9"/>
  </g>

  <!-- AI badge on card -->
  <rect x="696" y="394" width="180" height="36" rx="10" fill="#0E1513" stroke="#3FA34D" stroke-opacity="0.4" stroke-width="1"/>
  <circle cx="716" cy="412" r="7" fill="#3FA34D"/>
  <text x="730" y="417" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#FFFFFF" fill-opacity="0.8">IA · 1.2 seg · 47 productos</text>

  <!-- WhatsApp badge -->
  <rect x="896" y="394" width="124" height="36" rx="10" fill="#25D366"/>
  <text x="958" y="417" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Enviar WA</text>
</svg>
